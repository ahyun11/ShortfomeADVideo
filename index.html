<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정아현 숏폼 포트폴리오</title>
<style>
  :root {
    --bg: #0b0b0c;
    --surface: #141416;
    --border: rgba(255,255,255,0.08);
    --text: #f2f2f0;
    --text-dim: #8c8c8c;
    --accent: #d8ff4d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { background: var(--bg); }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */
  header {
    max-width: 1080px;
    margin: 0 auto;
    padding: 64px 24px 40px;
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
  }

  h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 16px;
  }

  .contact-info {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    color: var(--text-dim);
  }

  .contact-row svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    color: var(--text-dim);
  }

  .contact-row a {
    color: var(--text-dim);
    text-decoration: none;
  }

  .contact-row a:hover {
    color: var(--accent);
  }

  .meta-row {
    display: flex;
    gap: 28px;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .meta-item .num {
    font-size: 20px;
    font-weight: 700;
  }

  .meta-item .label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ---------- Tabs ---------- */
  .tabs {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .tab-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .tab-btn:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }

  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0b0b0c;
  }

  .empty-state {
    display: none;
    max-width: 1080px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }

  .empty-state.show { display: block; }

  /* ---------- Feed grid ---------- */
  .feed {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 24px 80px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }

  .feed.hidden { display: none; }

  .card {
    position: relative;
    aspect-ratio: 9 / 16;
    background: var(--surface);
    overflow: hidden;
    cursor: pointer;
    border-radius: 2px;
  }

  .card.ratio-4-5 {
    aspect-ratio: 4 / 5;
  }

  .card iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 177.78%; /* keeps 9:16 fill regardless of card box */
    min-height: 100%;
    transform: translate(-50%, -50%);
    border: none;
    pointer-events: none;
  }

  .card img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card .play-badge {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.0);
    transition: background 0.2s ease;
    z-index: 2;
  }

  .card .play-badge svg {
    width: 28px;
    height: 28px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .card:hover .play-badge {
    background: rgba(0,0,0,0.15);
  }

  .card .index {
    position: absolute;
    bottom: 8px;
    left: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.45);
    padding: 2px 7px;
    border-radius: 4px;
    z-index: 2;
    font-weight: 500;
  }

  /* ---------- Lightbox ---------- */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 40px 20px;
  }

  .lightbox.open { display: flex; }

  .lightbox-stage {
    position: relative;
    width: 100%;
    max-width: 380px;
  }

  .lightbox-inner {
    position: relative;
    width: 100%;
    aspect-ratio: 9 / 16;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }

  .lightbox-inner iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .lightbox-close {
    position: absolute;
    top: -52px;
    right: 0;
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 110;
    transition: background 0.2s ease;
  }

  .lightbox-close:hover { background: rgba(255,255,255,0.22); }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 110;
    transition: background 0.2s ease;
  }

  .lightbox-nav:hover { background: rgba(255,255,255,0.22); }
  .lightbox-nav svg { width: 22px; height: 22px; }
  .lightbox-prev { left: -56px; }
  .lightbox-next { right: -56px; }

  @media (max-width: 640px) {
    .lightbox-close { top: -44px; right: 0; }
    .lightbox-prev { left: 8px; }
    .lightbox-next { right: 8px; }
  }

  /* ---------- Footer ---------- */
  footer {
    max-width: 1080px;
    margin: 0 auto;
    padding: 48px 24px 64px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }

  footer .brand {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
  }

  footer a {
    color: var(--text);
    font-size: 14px;
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 2px;
  }

  footer a:hover { color: var(--accent); }

  @media (max-width: 720px) {
    .feed { grid-template-columns: repeat(3, 1fr); gap: 2px; }
    header { padding: 48px 20px 32px; }
    .meta-row { gap: 20px; }
    .tabs { padding: 0 20px; flex-wrap: wrap; }
    .tab-btn { font-size: 13px; padding: 8px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Short-form ad video</div>
  <h1>정아현 숏폼 포트폴리오</h1>
  <div class="contact-info">
    <div class="contact-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <a href="mailto:dkgusdl106@gmail.com">dkgusdl106@gmail.com</a>
    </div>
    <div class="contact-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.36 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.34 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <a href="tel:01083122065">010-8312-2065</a>
    </div>
  </div>
</header>

<div class="tabs" id="tabs">
  <button class="tab-btn active" data-tab="ai">AI 숏폼영상</button>
  <button class="tab-btn" data-tab="youtube">유튜브 단순 편집 숏폼</button>
</div>

<section class="feed" id="feed"></section>
<p class="empty-state" id="empty-state">아직 등록된 작업물이 없습니다.</p>

<div class="lightbox" id="lightbox">
  <div class="lightbox-stage">
    <button class="lightbox-close" id="lightbox-close" aria-label="닫기">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="이전 영상">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="다음 영상">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
    <div class="lightbox-inner" id="lightbox-inner"></div>
  </div>
</div>

<script>
  // Vimeo video IDs + hash (from share links), grouped by tab
  const videosByTab = {
    ai: [
      { id: "1203543144", hash: "cc696ac77e" },
      { id: "1203543020", hash: "ebf149daca" },
      { id: "1203543017", hash: "6cec5e0036" },
      { id: "1203543018", hash: "b78e787e54" },
      { id: "1203543016", hash: "4ba20a959b" },
      { id: "1203543666", hash: "38bfd3408a" },
      { id: "1203543736", hash: "d3bf131460" },
      { id: "1203543735", hash: "6487a9db50" },
      { id: "1203543836", hash: "f7953d51ef" },
      { id: "1203543838", hash: "657879050f" },
      { id: "1203543671", hash: "53cc58b777" },
      { id: "1203545531", hash: "a06a31486c" },
      { id: "1203545573", hash: "26ddfaa6b4" },
      { id: "1203545571", hash: "282b95c924" },
      { id: "1203545624", hash: "86bbb0de4d" },
      { id: "1203543533", hash: "c3735ae039" },
      { id: "1203543530", hash: "48eb5c545c" },
      { id: "1203545530", hash: "78f05e992f" },
      { id: "1203545626", hash: "4915727360" },
      { id: "1203543619", hash: "abf5edb7a3" },
      { id: "1203543532", hash: "409dfe541e" },
      { id: "1203543531", hash: "dc4546dd40" }
    ],
    youtube: [
      { id: "1205233602", hash: "ef4fe39c83", thumbnail: "thumbs/thumb-yt-1.jpg" },
      { id: "1205233631", hash: "dd16a986db", thumbnail: "thumbs/thumb-yt-2.jpg" },
      { id: "1205233807", hash: "430bf44373", thumbnail: "thumbs/thumb-yt-3.jpg" }
    ]
  };

  const feed = document.getElementById('feed');
  const emptyState = document.getElementById('empty-state');
  const tabButtons = document.querySelectorAll('.tab-btn');
  const lightbox = document.getElementById('lightbox');
  const lightboxInner = document.getElementById('lightbox-inner');
  const lightboxClose = document.getElementById('lightbox-close');
  const lightboxPrev = document.getElementById('lightbox-prev');
  const lightboxNext = document.getElementById('lightbox-next');

  let activeTab = 'ai';
  let currentIndex = 0;

  function vimeoThumbUrl(id, hash) {
    return `https://player.vimeo.com/video/${id}?h=${hash}&background=1&autoplay=0&loop=0&muted=1&controls=0`;
  }

  function vimeoPlayUrl(id, hash) {
    return `https://player.vimeo.com/video/${id}?h=${hash}&autoplay=1&loop=1&muted=0&title=0&byline=0&portrait=0`;
  }

  function getActiveVideos() {
    return videosByTab[activeTab] || [];
  }

  function renderFeed() {
    const videos = getActiveVideos();
    feed.innerHTML = '';

    if (videos.length === 0) {
      feed.classList.add('hidden');
      emptyState.classList.add('show');
      return;
    }

    feed.classList.remove('hidden');
    emptyState.classList.remove('show');

    videos.forEach((v, i) => {
      const card = document.createElement('div');
      card.className = v.thumbnail ? 'card ratio-4-5' : 'card';
      const mediaHtml = v.thumbnail
        ? `<img src="${v.thumbnail}" alt="" loading="lazy">`
        : `<iframe src="${vimeoThumbUrl(v.id, v.hash)}" allow="autoplay" loading="lazy"></iframe>`;
      card.innerHTML = `
        ${mediaHtml}
        <div class="play-badge">
          <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span class="index">${String(i + 1).padStart(2, '0')}</span>
      `;
      card.addEventListener('click', () => openLightbox(i));
      feed.appendChild(card);
    });
  }

  function switchTab(tabName) {
    activeTab = tabName;
    tabButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tabName);
    });
    renderFeed();
  }

  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  function renderCurrent() {
    lightboxInner.innerHTML = '';
    const videos = getActiveVideos();
    const v = videos[currentIndex];
    if (!v) return;
    const iframe = document.createElement('iframe');
    iframe.src = vimeoPlayUrl(v.id, v.hash);
    iframe.allow = 'autoplay; fullscreen; picture-in-picture';
    iframe.allowFullscreen = true;
    lightboxInner.appendChild(iframe);
  }

  function openLightbox(index) {
    currentIndex = index;
    renderCurrent();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    lightboxInner.innerHTML = '';
  }

  function showNext() {
    const videos = getActiveVideos();
    if (videos.length === 0) return;
    currentIndex = (currentIndex + 1) % videos.length;
    renderCurrent();
  }

  function showPrev() {
    const videos = getActiveVideos();
    if (videos.length === 0) return;
    currentIndex = (currentIndex - 1 + videos.length) % videos.length;
    renderCurrent();
  }

  lightboxClose.addEventListener('click', closeLightbox);
  lightboxNext.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });
  lightboxPrev.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') showNext();
    if (e.key === 'ArrowLeft') showPrev();
  });

  // Mobile swipe support
  let touchStartX = 0;
  let touchEndX = 0;

  lightbox.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  lightbox.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    const threshold = 50;
    if (diff > threshold) showNext();
    else if (diff < -threshold) showPrev();
  }, { passive: true });

  // Initial render
  renderFeed();
</script>

</body>
</html>
